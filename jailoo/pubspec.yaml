name: jailoo
description: Smart pasture navigator for Naryn Oblast, Kyrgyzstan
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Maps — MapLibre GL: real 3D pitch/bearing, vector tiles, GeoJSON layers
  maplibre_gl: ^0.21.0

  # HTTP
  http: ^1.2.1

  # State
  provider: ^6.1.2

  # Offline cache
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
    - family: DMMono
      fonts:
        - asset: assets/fonts/DMMono-Regular.ttf
